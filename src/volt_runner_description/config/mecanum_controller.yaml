controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_controller:
  ros__parameters:
    front_left_wheel_names:  ["front_left_wheel_joint"]
    front_right_wheel_names: ["front_right_wheel_joint"]
    rear_left_wheel_names:   ["rear_left_wheel_joint"]
    rear_right_wheel_names:  ["rear_right_wheel_joint"]

    wheel_radius: 0.04
    wheel_separation_w: 0.20
    wheel_separation_l: 0.16

    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: false
    use_stamped_vel: false
    cmd_vel_timeout: 0.5
