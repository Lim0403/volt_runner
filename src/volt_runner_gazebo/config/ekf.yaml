ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    publish_tf: true
    two_d_mode: true

    frequency: 30.0
    sensor_timeout: 0.2

    # 프레임 설정
    world_frame: "odom"          # EKF 기준 좌표
    odom_frame: "odom"           # EKF가 만들어낼 odom
    base_link_frame: "base_footprint"  # 로봇 기준 프레임

    # map_frame 은 EKF에서 만들지 말고, slam_toolbox가 map->odom 담당하게 둔다
    # map_frame: "map"   <-- 이 줄은 지운다

    # 입력: Gazebo odom 브릿지
    odom0: "/odom/unfiltered"

    # odom0_config: x, y, z,
    #               roll, pitch, yaw,
    #               vx, vy, vz,
    #               vroll, vpitch, vyaw,
    #               ax, ay, az
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10
